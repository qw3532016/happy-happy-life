<style>

  body { font-family: system-ui, -apple-system, sans-serif; background: var(--dark); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

header { background: var(–blue); border-bottom: 3px solid var(–gold); padding: 0 16px; height: 52px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
header h1 { font-size: 15px; font-weight: 800; letter-spacing: 1px; }
header span { font-size: 10px; color: var(–gold); letter-spacing: 1px; text-transform: uppercase; }

.tabs { display: flex; background: #0a1218; border-bottom: 1px solid var(–border); flex-shrink: 0; }
.tab { flex: 1; padding: 10px 0; font-size: 12px; font-weight: 600; cursor: pointer; background: none; border: none; border-bottom: 2px solid transparent; color: var(–muted); }
.tab.active { border-bottom-color: var(–gold); color: var(–gold); }

.view { display: none; height: 100%; flex-direction: column; }
.view.active { display: flex; }

/* List */
.search-wrap { padding: 10px 12px; border-bottom: 1px solid var(–border); flex-shrink: 0; }
.search-wrap input { width: 100%; background: var(–panel); border: 1px solid var(–border); border-radius: 8px; color: var(–text); padding: 8px 12px; font-size: 14px; outline: none; }
.search-wrap input:focus { border-color: var(–gold); }
.count { padding: 5px 16px; font-size: 11px; color: var(–muted); border-bottom: 1px solid var(–border); flex-shrink: 0; }
.list-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.inst-item { padding: 11px 16px; cursor: pointer; border-left: 3px solid transparent; display: flex; align-items: center; gap: 10px; transition: background 0.1s; }
.inst-item:active, .inst-item.active { background: var(–panel); border-left-color: var(–red); }
.inst-emoji { font-size: 18px; flex-shrink: 0; }
.inst-name { font-size: 13px; font-weight: 500; line-height: 1.3; }
.inst-borough { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; margin-top: 2px; }
.inst-arrow { color: var(–border); font-size: 16px; margin-left: auto; }

/* Map */
#map { flex: 1; width: 100%; }

/* Detail */
.detail-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.back-btn { display: flex; align-items: center; gap: 6px; padding: 12px 16px; cursor: pointer; color: var(–muted); font-size: 13px; background: none; border: none; border-bottom: 1px solid var(–border); width: 100%; text-align: left; }
.detail-hero { padding: 24px 20px 20px; border-bottom-width: 2px; border-bottom-style: solid; }
.detail-emoji { font-size: 40px; margin-bottom: 8px; }
.detail-borough-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
.detail-title { font-size: 20px; font-weight: 800; line-height: 1.2; }
.detail-body { padding: 20px; }
.detail-desc { font-size: 14px; line-height: 1.75; color: #a8bfcf; }
.loading { display: flex; align-items: center; gap: 8px; color: var(–muted); font-size: 13px; }
.spinner { width: 14px; height: 14px; border: 2px solid var(–border); border-top-color: var(–gold); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
.maps-link { display: inline-block; margin-top: 16px; padding: 10px 18px; background: var(–red); color: #fff; border-radius: 6px; font-size: 13px; font-weight: 600; text-decoration: none; }
.more-section { margin-top: 28px; border-top: 1px solid var(–border); padding-top: 20px; }
.more-label { font-size: 11px; color: var(–muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
.more-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(–border); cursor: pointer; }
.more-item-emoji { font-size: 16px; }
.more-item-name { font-size: 13px; color: #a8bfcf; }

.empty-state { padding: 24px; color: var(–muted); font-size: 14px; }
.stripe { height: 4px; background: linear-gradient(90deg, var(–blue), var(–red), var(–gold), var(–blue)); flex-shrink: 0; }

@keyframes spin { to { transform: rotate(360deg); } }
</style>

// ── Tab switching ──────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['list','map','detail'][i] === tab);
  });
  document.querySelectorAll('.view').forEach(v => {
    v.style.display = 'none';
    v.classList.remove('active');
  });
  const el = document.getElementById('view-' + tab);
  el.style.display = 'flex';
  el.classList.add('active');

  if (tab === 'map' && !mapInitialized) {
    initMap();
    mapInitialized = true;
  }
}

// ── List ───────────────────────────────────────────────────────────────────

  );

  if (map) {
    markers.forEach(m => {
      m.setVisible(filtered.some(f => f.name === m.instName));
    });
  }
}

function renderList(list) {
  const ul = document.getElementById('instList');
  ul.innerHTML = '';
  list.forEach(inst => {
    const div = document.createElement('div');
    div.className = 'inst-item' + (selectedInst?.name === inst.name ? ' active' : '');
    div.innerHTML = `
      <span class="inst-emoji">${inst.emoji}</span>
      <div style="flex:1;min-width:0">
        <div class="inst-name">${inst.name}</div>
        <div class="inst-borough" style="color:${BOROUGH_COLORS[inst.borough]}">${inst.borough}</div>
      </div>
      <span class="inst-arrow">›</span>
    `;
    div.onclick = () => openDetail(inst);
    ul.appendChild(div);
  });
}

// ── Google Map ─────────────────────────────────────────────────────────────
function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 40.730, lng: -73.935 },
    zoom: 11,
    styles: [
      { elementType: "geometry", stylers: [{ color: "#0f1923" }] },
      { elementType: "labels.text.fill", stylers: [{ color: "#a8bfcf" }] },
      { elementType: "labels.text.stroke", stylers: [{ color: "#0f1923" }] },
      { featureType: "road", elementType: "geometry", stylers: [{ color: "#1c2a38" }] },
      { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#1c3050" }] },
      { featureType: "water", elementType: "geometry", stylers: [{ color: "#0d1e2e" }] },
      { featureType: "poi.park", elementType: "geometry", stylers: [{ color: "#0d2a18" }] },
      { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] },
    ],
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false,
  });

  infoWindow = new google.maps.InfoWindow();

  INSTITUTIONS.forEach(inst => {
    const color = BOROUGH_COLORS[inst.borough] || '#E8A020';
    const marker = new google.maps.Marker({
      position: { lat: inst.lat, lng: inst.lng },
      map,
      title: inst.name,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 8,
        fillColor: color,
        fillOpacity: 0.9,
        strokeColor: '#ffffff',
        strokeWeight: 1.5,
      }
    });
    marker.instName = inst.name;
    marker.addEventListener = marker.addListener;
    marker.addListener('click', () => {
      openDetail(inst);
      switchTab('detail');
    });
    markers.push(marker);
  });
}

// ── Detail ─────────────────────────────────────────────────────────────────
async function openDetail(inst) {
  selectedInst = inst;
  switchTab('detail');

  // Re-render list to show active state
  filterList();

  // Pan map if ready
  if (map) {
    map.panTo({ lat: inst.lat, lng: inst.lng });
    map.setZoom(14);
    markers.forEach(m => {
      const color = BOROUGH_COLORS[inst.borough] || '#E8A020';
      m.setIcon({
        path: google.maps.SymbolPath.CIRCLE,
        scale: m.instName === inst.name ? 11 : 7,
        fillColor: m.instName === inst.name ? '#ffffff' : (BOROUGH_COLORS[INSTITUTIONS.find(i=>i.name===m.instName)?.borough] || '#E8A020'),
        fillOpacity: m.instName === inst.name ? 1 : 0.8,
        strokeColor: m.instName === inst.name ? color : '#ffffff',
        strokeWeight: m.instName === inst.name ? 3 : 1,
      });
    });
  }

  const color = BOROUGH_COLORS[inst.borough] || '#E8A020';
  const mapsUrl = `https://www.google.com/maps/search/${encodeURIComponent(inst.name + ' ' + inst.borough + ' New York')}`;

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-hero" style="background:${color}22;border-bottom-color:${color}">
      <div class="detail-emoji">${inst.emoji}</div>
      <div class="detail-borough-label" style="color:${color}">${inst.borough}</div>
      <div class="detail-title">${inst.name}</div>
    </div>
    <div class="detail-body">
      <div id="descArea" class="loading"><div class="spinner"></div> Loading info…</div>
      <a class="maps-link" href="${mapsUrl}" target="_blank">Open in Google Maps ↗</a>
      <div class="more-section">
        <div class="more-label">More in ${inst.borough}</div>
        ${INSTITUTIONS.filter(i => i.borough === inst.borough && i.name !== inst.name).slice(0,5).map(i => `
          <div class="more-item" onclick="openDetail(${JSON.stringify(i).replace(/"/g,'&quot;')})">
            <span class="more-item-emoji">${i.emoji}</span>
            <span class="more-item-name">${i.name}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  if (descCache[inst.name]) {
    document.getElementById('descArea').innerHTML = `<p class="detail-desc">${descCache[inst.name]}</p>`;
    return;
  }

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content: `Write a concise 3-sentence introduction to "${inst.name}" in ${inst.borough}, New York City. Include what it is, what it's known for, and why visitors should go. Be warm and informative. Return only the 3 sentences, no headers.` }]
      })
    });
    const data = await res.json();
    const text = data.content?.find(b => b.type === 'text')?.text || 'No information available.';
    descCache[inst.name] = text;
    const el = document.getElementById('descArea');
    if (el) el.innerHTML = `<p class="detail-desc">${text}</p>`;
  } catch {
    const el = document.getElementById('descArea');
    if (el) el.innerHTML = `<p class="detail-desc" style="color:#5a7a99">Could not load description. Check your internet connection.</p>`;
  }
}

// Init list on load
window.onload = () => {
  document.getElementById('countLabel').textContent = INSTITUTIONS.length + ' institutions';
  renderList(INSTITUTIONS);
};
</script>
